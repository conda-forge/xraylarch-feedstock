{% set name = "xraylarch" %}
{% set version = "2026.1.2" %}

package:
  name: {{ name|lower }}-suite
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 083c0d465094036d3f45d94eec9146270c4add4a0e9064d9d619dca38b8d2ff9

build:
  number: 0
  skip: true  # [py<310]

outputs:
  - name: xraylarch-base
    script: build_base.bat  # [win]
    script: build_base.sh  # [not win]
    build:
      entry_points:
        - larch = larch.apps:run_larch
        - larix = larch.apps:run_larix
        - feff6l = larch.apps:run_feff6l
        - feff8l = larch.apps:run_feff8l
        - larch_server = larch.apps:run_larch_server
        - larch_xrf = larch.apps:run_larch_xrf
        - larch_xrd1d = larch.apps:run_larch_xrd1d
        - gse_mapviewer = larch.apps:run_gse_mapviewer
        - epics_xrf = larch.apps:run_epics_xrf
        - larchjupyterlab = larch.apps:run_larch_jupyterlab
    requirements:
      host:
        - python
        - pip
        - setuptools
        - wheel
        - setuptools_scm
      run:
        - python
        - asteval >=1.0.7
        - charset-normalizer
        - dill
        - fabio
        - h5py >=3.13
        - hdf5plugin
        - imageio
        - lmfit >=1.3.1
        - larixite >=2025.5.1
        - matplotlib-base >=3.10
        - numdifftools >=0.9.41
        - numexpr >=2.8.7
        - numpy >=2
        - packaging
        - peakutils
        - pillow >=8.3.2
        - pip
        - psutil
        - pycifrw
        - pyfai-base
        - pyshortcuts >=1.9.5
        - pyyaml
        - requests
        - scikit-image
        - scikit-learn
        - scipy >=1.15
        - silx-base >=2.0
        - sqlalchemy >=2.0
        - sqlalchemy-utils
        - termcolor
        - tabulate
        - tomli
        - tomli-w
        - uncertainties >=3.2.1
        - xraydb >=4.5.7
    test:
      imports:
        - larch
        - larch.xrd
      #commands:
      #  - pip check
      #requires:
      #  - pip

  - name: xraylarch
    build:
      noarch: generic
    requirements:
      host:
        - python
      run:
        - python
        - silx
        - pyfai
        # wxgui extras_require
        - wxpython >=4.2.2
        - wxutils >=0.3.6
        - wxmplot >=2025.1.6
        - darkdetect
        # qtgui extras_require
        - pyqt
        - pyqtwebengine
        - pyqtgraph
        # jupyter extras_require
        - jupyter_core >=5.0
        - jupyter_client
        - jupyter_server
        - notebook
        - nbformat
        - ipywidgets
        - plotly
        - bokeh
        - py3dmol
        - {{ pin_subpackage('xraylarch-base', max_pin="x.x.x") }}
    test:
      imports:
        - larch
        - larch.xrd
      commands:
        - larch --help
        - larix --help
        - feff6l --help
        - feff8l --help
        - larch_server --help
        - larch_xrf --help
        - larch_xrd1d --help
        - gse_mapviewer --help
        # - epics_xrf
        - larchjupyterlab --help

about:
  home: https://xraypy.github.io/xraylarch
  license: MIT
  license_file: LICENSE
  summary: 'Larch: X-ray Analysis for Synchrotron Applications using Python'
  doc_url: https://xraypy.github.io/xraylarch
  dev_url: https://github.com/xraypy/xraylarch

extra:
  recipe-maintainers:
    - maurov
    - mrakitin
    - conda-forge/event-model
